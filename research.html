  const form = document.getElementById("surveyForm");

for (let i = 1; i <= 20; i++) {

    <label>
      <input type="radio" name="q${i}" value="${opt}">

  `).join(" ");
  form.appendChild(div);
}

// ✅ 카운터 표시
function updateCounter() {
  document.getElementById("counter").innerText =
    OPTIONS.map(o => `${o}번: ${counts[o]}/${MAX_PER_OPTION}`).join(" | ");
}

// ✅ 선택 이벤트
document.addEventListener("change", function(e) {
  if (e.target.type !== "radio") return;

  const name = e.target.name;
  const selected = e.target.value;

  const prev = document.querySelector(`input[name="${name}"][data-selected="true"]`);

  if (prev) {
    counts[prev.value]--;
    prev.removeAttribute("data-selected");
  }

  if (counts[selected] >= MAX_PER_OPTION) {
    alert("이 선택지는 25개를 초과할 수 없습니다.");
    e.target.checked = false;
    return;
  }

  counts[selected]++;
  e.target.setAttribute("data-selected", "true");

  updateCounter();
});

// ✅ CSV 다운로드
function downloadCSV(answers, name, studentId) {
  const header = ["name", "studentId", "timestamp"];
  for (let i = 1; i <= answers.length; i++) {
    header.push("q" + i);
  }

  const row = [name, studentId, new Date().toISOString(), ...answers];

  const csvContent = [
    header.join(","),
    row.join(",")
  ].join("\n");

  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  const safeName = name.replace(/[^\w가-힣]/g, "");
  const safeId = studentId.replace(/[^\w]/g, "");

  a.href = url;
  a.download = `${safeName}_${safeId}.csv`;
  a.click();

  URL.revokeObjectURL(url);
}

// ✅ 제출
async function submitForm() {

  // ✅ 1회 제한
  if (localStorage.getItem("submitted")) {
    alert("이미 설문에 참여하셨습니다.");
    return;
  }

  const name = document.getElementById("username").value.trim();
  const studentId = document.getElementById("studentId").value.trim();

  if (!name || !studentId) {
    alert("이름과 학번을 입력하세요");
    return;
  }

  const answers = [];

  for (let i = 1; i <= 20; i++) {
    const checked = document.querySelector(`input[name="q${i}"]:checked`);
    if (!checked) {
      alert(`${i}번 문항을 선택하세요`);
      return;
    }
    answers.push(checked.value);
  }

  for (let key in counts) {
    if (counts[key] > MAX_PER_OPTION) {
      alert("제한 초과");
      return;
    }
  }

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        name: name,
        studentId: studentId,
        answers: answers
      })
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem("submitted", "true"); // ✅ 저장
      document.querySelector("button").disabled = true; // ✅ 버튼 잠금
      alert("✅ 제출 완료 (구글시트 저장됨)");
    } else {
      alert("저장 실패");
    }

  } catch (e) {
    alert("서버 오류");
  }
}


// 초기 실행
updateCounter();
